<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Generator Kaligrafi Aksara Jawa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Javanese:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="controls">
            <h2>Panel Kontrol</h2>
            <label>Pilih Hewan:</label>
            <select id="shapeSelect">
                <option value="ayam">Ayam Jago</option>
                <option value="burung">Burung Terbang</option>
            </select>

            <label>Tulis Aksara Jawa:</label>
            <textarea id="textInput">ꦱꦸꦒꦼꦁꦫꦮꦠꦼꦤ꧀</textarea>
            <button id="downloadBtn">Simpan Gambar</button>
        </div>

        <div class="display">
            <svg id="svgCanvas" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
                <rect width="100%" height="100%" fill="white"/>
                
                <defs>
                    <path id="path_ayam" d="M300,500 C150,500 50,350 50,250 C50,100 200,50 300,150 C350,50 550,100 550,250 C550,350 450,500 300,500 Z" />
                    
                    <path id="path_burung" d="M50,300 Q150,100 300,300 Q450,100 550,300 Q300,500 50,300" />
                </defs>

                <text class="javanese-text">
                    <textPath id="targetPath" href="#path_ayam" startOffset="0">
                        </textPath>
                </text>
            </svg>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
